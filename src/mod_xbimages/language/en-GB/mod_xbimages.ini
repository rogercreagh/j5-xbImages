;xbImages Language file
;v0.5.0.0 18th February
MOD_XBIMG_NAME="xbImages Carousel"
MOD_XBIMG_DESC="Creates a single image carousel with configurable delay and images sourced either from any folder or xbMusic Albums table"
MOD_XBIMAGES="xbImages"
;Config strings
MOD_XBIMG_SUBTITLE="Subtitle"
MOD_XBIMG_SUBTITLE_DESC="Optional. Will appears above the image"
MOD_XBIMG_DELAY="Delay (secs)"
MOD_XBIMG_DELAY_DESC="Second to display image before changing to next"
MOD_XBIMG_SOURCE="Image Source"
MOD_XBIMG_SOURCE_DESC="Folder will select all images in the selected folder and subfolders. xbMusic will select all images from xbMusic Albums with optional filtering by Album tags"
MOD_XBIMG_FOLDER="Folder"
MOD_XBIMG_XBMUSIC="xbMusic"
MOD_XBIMG_IMGFOLDER="Select a folder"
MOD_XBIMG_IMGFOLDER_DESC="All sub-folders of the selected folder will be scanned. Files must match one of the extensions specified below"
MOD_XBIMG_FILETYPES="File types to include"
MOD_XBIMG_FILETYPE_DESCS="specify the acceptable extensions in lower case separated by commas without the dot Case will be ignore so 'jpg' covers 'jpg' and 'JPG'"
MOD_XBIMG_ALBUMNOTE="xbMusic component must be installed for this to work."
MOD_XBIMG_ALBUMNOTE_DESC="Images will be those used by Albums in the xbMusic database. If xbMusic is not installed no images will be found. You can optionally filter the albums by tag(s). If you select multiple tags then albums matching any of the selected tags will be used."
MOD_XBIMG_ALBUMINFO="Show Title &amp; Artist"
MOD_XBIMG_ALBUMINFO_DESC="Optionally display album title and/or artist below the image"
MOD_XBIMG_NONE="None"
MOD_XBIMG_TITLE="Title"
MOD_XBIMG_ARTIST="Artist"
MOD_XBIMG_BOTH="Both"
MOD_XBIMG_SHOWYEAR="Show release year"
MOD_XBIMG_SHOWYEAR_DESC="if title is showing also show release year"
MOD_XBIMG_HIDE="Hide"
MOD_XBIMG_SHOW="Show"
MOD_XBIMG_TAGS="Tags Filter"
MOD_XBIMG_TAGS_DESC="Filter albums by any of the selected tags"
